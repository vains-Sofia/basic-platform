spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/basic-platform?serverTimezone=Asia/Shanghai&userUnicode=true&characterEncoding=utf-8
    username: root
    password: root

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      database: 5

springdoc:
  # 是否显示登录接口
  show-login-endpoint: true

server:
  port: 9998

# Mybatis Plus相关配置
mybatis-plus:
  # mapper文件位置
  mapper-locations: classpath*:/mapper/**/*.xml,classpath:com/basic/mapper/xml/*.xml

logging:
  level:
    # 打印SQL
    com.basic.mapper: debug

basic:
  cloud:
    cors:
      # 允许跨域地址
      allowed-origins:
        - http://localhost:5173
        - http://127.0.0.1:5173

    security:
      token:
        access-token-expire: 7200
        refresh-token-expire: 7
        issuer: basic-server

      login:
        # 前端页面地址
        front-end-url: http://127.0.0.1:5173
